<!DOCTYPE html>
<html>
<head>
  <title>Mead Maker's Toolkit</title>

  <style>
    body {
      background-color: #1f1712;
      color: #f5e6c8;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    .card {
      background-color: #33251c;
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background-color: #d89b3d;
      color: #1f1712;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background-color: #f0b85a;
    }

    #result {
      font-size: 20px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Mead Maker's Toolkit</h1>

    <h2>Original Gravity Calculator</h2>

    <p>Pounds of honey:</p>
    <input id="honey" type="number" placeholder="Example: 3">

    <p>Batch size in gallons:</p>
    <input id="gallons" type="number" placeholder="Example: 1">

    <br>

    <button onclick="calculateOG()">Calculate OG</button>

    <p id="result"></p>
  </div>

  <script>
    function calculateOG() {
      let honey = Number(document.getElementById("honey").value);
      let gallons = Number(document.getElementById("gallons").value);

      let gravityPoints = (honey * 35) / gallons;
      let og = 1 + (gravityPoints / 1000);

      document.getElementById("result").innerText =
        honey + " lb of honey in " + gallons + " gallon(s) gives an estimated OG of " + og.toFixed(3);
    }
  </script>
</body>
</html>
