<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Mead Maker's Toolkit</title>

</head>

<body>
  <div class="card">
    <h1>Mead Maker's Toolkit</h1>

    <h2>Original Gravity Calculator</h2>

    <p>Pounds of honey:</p>
    <input id="honey" type="number" placeholder="Example: 3">

    <p>Batch size in gallons:</p>
    <input id="gallons" type="number" placeholder="Example: 1">

    <br>

    <button onclick="calculateOG()">Calculate OG</button>

    <p id="result"></p>
  </div>


  <h2>ABV Calculator</h2>

<p>Original Gravity:</p>
<input id="og" type="number" step="0.001" placeholder="Example: 1.105">

<p>Final Gravity:</p>
<input id="fg" type="number" step="0.001" placeholder="Example: 0.998">

<br>

<button onclick="calculateABV()">Calculate ABV</button>

<p id="abvResult"></p>

</body>
</html>
