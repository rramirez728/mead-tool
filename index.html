<!DOCTYPE html>
<html>
<head>
  <title>Mead Calculator</title>
</head>
<body>
  <h1>Mead Calculator</h1>

  <p>Enter how many pounds of honey you want to use:</p>

  <input id="honey" type="number" placeholder="Example: 3">
  <button onclick="calculate()">Calculate</button>

  <h2>Result:</h2>
  <p id="result"></p>

  <script>
    function calculate() {
      let honey = document.getElementById("honey").value;

      let gallons = honey / 3;

      document.getElementById("result").innerText =
        honey + " lb of honey is roughly good for " + gallons.toFixed(2) + " gallon(s) of mead.";
    }
  </script>
</body>
</html>
